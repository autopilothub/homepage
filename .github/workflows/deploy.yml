name: Build and deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "k8s/**"
      - "argocd/**"
      - "docs/**"
      - "**.md"
  workflow_dispatch: {}

env:
  IMAGE_NAME: ghcr.io/autopilothub/homepage

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives tags + OCI labels (source/revision/created) so the image
      # registers as a package linked to this repo in the GitHub UI.
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push image (linux/arm64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update k8s manifest with new image tag
        run: |
          cd k8s
          curl -sLO "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz"
          tar xzf kustomize_v5.4.3_linux_amd64.tar.gz
          ./kustomize edit set image ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          rm kustomize kustomize_v5.4.3_linux_amd64.tar.gz

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          git diff --cached --quiet || git commit -m "deploy: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          git push
